name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for gh release create

jobs:
  # ── Windows ────────────────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller DiscordMediaDownscaler.spec --clean --noconfirm

      - name: Rename binary
        shell: cmd
        run: move dist\DiscordMediaDownscaler.exe dist\DiscordMediaDownscaler-windows.exe

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/DiscordMediaDownscaler-windows.exe

  # ── Linux ──────────────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # tkinter is NOT included in the GitHub Actions Python install on Ubuntu
      - name: Install system Tkinter
        run: sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller DiscordMediaDownscaler.spec --clean --noconfirm

      - name: Rename binary
        run: mv dist/DiscordMediaDownscaler dist/DiscordMediaDownscaler-linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/DiscordMediaDownscaler-linux

  # ── macOS (Apple Silicon) ──────────────────────────────────────────────────
  build-macos:
    name: Build (macOS arm64)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: python -m PyInstaller DiscordMediaDownscaler.spec --clean --noconfirm

      - name: Rename binary
        run: mv dist/DiscordMediaDownscaler dist/DiscordMediaDownscaler-macos

      - uses: actions/upload-artifact@v4
        with:
          name: macos-binary
          path: dist/DiscordMediaDownscaler-macos

  # ── GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-binary
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: dist/

      - uses: actions/download-artifact@v4
        with:
          name: macos-binary
          path: dist/

      - name: Create release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/DiscordMediaDownscaler-windows.exe \
            dist/DiscordMediaDownscaler-linux \
            dist/DiscordMediaDownscaler-macos \
            --title "Discord Media Downscaler ${{ github.ref_name }}" \
            --notes "## Discord Media Downscaler ${{ github.ref_name }}

          Compress images, video, and audio to fit Discord's file limits with minimal quality loss.

          ### Download for your platform

          | Platform | File |
          |---|---|
          | Windows | \`DiscordMediaDownscaler-windows.exe\` |
          | Linux | \`DiscordMediaDownscaler-linux\` |
          | macOS (Apple Silicon) | \`DiscordMediaDownscaler-macos\` |

          **Linux:** \`chmod +x DiscordMediaDownscaler-linux && ./DiscordMediaDownscaler-linux\`

          **macOS:** Right-click → Open (to bypass Gatekeeper), or:
          \`\`\`bash
          xattr -d com.apple.quarantine DiscordMediaDownscaler-macos
          chmod +x DiscordMediaDownscaler-macos
          ./DiscordMediaDownscaler-macos
          \`\`\`

          See the [README](https://github.com/${{ github.repository }}#readme) for full instructions."
